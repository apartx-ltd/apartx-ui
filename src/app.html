<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Prevent a document-scrollbar flash before app CSS applies (the app shell owns scroll). -->
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
				overflow: hidden;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
